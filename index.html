<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Game</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1>Memory Game</h1>

    <div class="tabs">
        <button class="tab-btn active" data-tab="game">Game</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <div id="game" class="tab-content active">
        <div class="controls">
            <label>
                Timer (seconds):
                <input type="number" id="timerInput" value="60" min="10" max="600">
            </label>

            <button id="startBtn">Start / Restart</button>
        </div>

        <div id="board"></div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div class="settings-panel">
            <div class="setting-item">
                <label for="rowsInput">Rows:</label>
                <input type="number" id="rowsInput" value="4" min="2" max="8">
            </div>

            <div class="setting-item">
                <label for="colsInput">Columns:</label>
                <input type="number" id="colsInput" value="8" min="2" max="8">
            </div>

            <button id="applySettingsBtn">Apply Settings</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
